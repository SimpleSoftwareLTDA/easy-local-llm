name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: Create release from this run
        type: boolean
        default: false

env:
  NODE_VERSION: '22'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: TypeScript check
        run: bunx tsc --noEmit

  build-macos-arm64:
    name: Build macOS (ARM64)
    runs-on: macos-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Vite build
        run: bunx vite build
      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          NODE_ENV: production
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllocalchat-macos-arm64
          path: build/
          retention-days: 14

  build-windows-x64:
    name: Build Windows (x64)
    runs-on: windows-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Vite build
        run: bunx vite build
      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          NODE_ENV: production
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllocalchat-windows-x64
          path: build/
          retention-days: 14

  build-linux-x64:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Vite build
        run: bunx vite build
      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          NODE_ENV: production

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Prepare .deb package
        run: |
          APP_NAME="easy-local-chat"
          VERSION="${GITHUB_REF#refs/tags/v}"
          [ "$VERSION" = "$GITHUB_REF" ] && VERSION="0.0.0-ci.${GITHUB_RUN_NUMBER}"

          DEB_DIR="deb-package"
          mkdir -p "${DEB_DIR}/opt/${APP_NAME}"
          mkdir -p "${DEB_DIR}/usr/share/applications"
          mkdir -p "${DEB_DIR}/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "${DEB_DIR}/DEBIAN"

          BUILD_DIR=$(find build/ -maxdepth 1 -type d -name '*linux*' | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "ERROR: No linux build directory found in build/"
            ls -la build/
            exit 1
          fi
          echo "Using build directory: $BUILD_DIR"
          cp -r "${BUILD_DIR}/"/* "${DEB_DIR}/opt/${APP_NAME}/"

          cp assets/icon.png "${DEB_DIR}/usr/share/icons/hicolor/256x256/apps/${APP_NAME}.png"

          # Control file
          printf 'Package: %s\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: amd64\nMaintainer: Robson Cassiano <robson.cassiano@pm.me>\nDescription: Easy Local Chat - Run AI locally\n A cross-platform desktop app that runs LLMs locally.\n' "${APP_NAME}" "${VERSION}" > "${DEB_DIR}/DEBIAN/control"

          # Desktop entry
          printf '[Desktop Entry]\nVersion=1.0\nType=Application\nName=Easy Local Chat\nExec=/opt/%s/bin/launcher\nIcon=%s\nTerminal=false\nCategories=Development;ArtificialIntelligence;\nComment=Private AI assistant running locally with Gemma-4\n' "${APP_NAME}" "${APP_NAME}" > "${DEB_DIR}/usr/share/applications/${APP_NAME}.desktop"

          chmod +x "${DEB_DIR}/opt/${APP_NAME}/bin/launcher" 2>/dev/null || true
          dpkg-deb --build "${DEB_DIR}" "${APP_NAME}_${VERSION}_amd64.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllocalchat-linux-x64-deb
          path: "*.deb"
          retention-days: 14

  build-linux-arm64:
    name: Build Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Vite build
        run: bunx vite build
      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          NODE_ENV: production

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Prepare .deb package
        run: |
          APP_NAME="easy-local-chat"
          VERSION="${GITHUB_REF#refs/tags/v}"
          [ "$VERSION" = "$GITHUB_REF" ] && VERSION="0.0.0-ci.${GITHUB_RUN_NUMBER}"

          DEB_DIR="deb-package"
          mkdir -p "${DEB_DIR}/opt/${APP_NAME}"
          mkdir -p "${DEB_DIR}/usr/share/applications"
          mkdir -p "${DEB_DIR}/usr/share/icons/hicolor/256x256/apps"
          mkdir -p "${DEB_DIR}/DEBIAN"

          BUILD_DIR=$(find build/ -maxdepth 1 -type d -name '*linux*arm*' | head -1)
          [ -z "$BUILD_DIR" ] && BUILD_DIR=$(find build/ -maxdepth 1 -type d -name '*linux*' | head -1)
          if [ -z "$BUILD_DIR" ]; then
            echo "ERROR: No linux build directory found in build/"
            ls -la build/
            exit 1
          fi
          echo "Using build directory: $BUILD_DIR"
          cp -r "${BUILD_DIR}/"/* "${DEB_DIR}/opt/${APP_NAME}/"

          cp assets/icon.png "${DEB_DIR}/usr/share/icons/hicolor/256x256/apps/${APP_NAME}.png"

          # Control file
          printf 'Package: %s\nVersion: %s\nSection: utils\nPriority: optional\nArchitecture: arm64\nMaintainer: Robson Cassiano <robson.cassiano@pm.me>\nDescription: Easy Local Chat - Run AI locally\n A cross-platform desktop app that runs LLMs locally.\n' "${APP_NAME}" "${VERSION}" > "${DEB_DIR}/DEBIAN/control"

          # Desktop entry
          printf '[Desktop Entry]\nVersion=1.0\nType=Application\nName=Easy Local Chat\nExec=/opt/%s/bin/launcher\nIcon=%s\nTerminal=false\nCategories=Development;ArtificialIntelligence;\nComment=Private AI assistant running locally with Gemma-4\n' "${APP_NAME}" "${APP_NAME}" > "${DEB_DIR}/usr/share/applications/${APP_NAME}.desktop"

          chmod +x "${DEB_DIR}/opt/${APP_NAME}/bin/launcher" 2>/dev/null || true
          dpkg-deb --build "${DEB_DIR}" "${APP_NAME}_${VERSION}_arm64.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllocalchat-linux-arm64-deb
          path: "*.deb"
          retention-days: 14

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-macos-arm64, build-windows-x64, build-linux-x64, build-linux-arm64]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Archive builds
        run: |
          mkdir -p builds
          for dir in easyllocalchat-*; do
            if [ -d "$dir" ]; then
              if ls "$dir"/*.deb 1>/dev/null 2>&1; then
                cp "$dir"/*.deb builds/
              else
                zip -r "builds/${dir}.zip" "$dir"
              fi
            fi
          done
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: builds/*
      - name: Create Canary Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        with:
          tag_name: canary-${{ github.sha }}
          name: Canary Build ${{ github.sha }}
          draft: true
          prerelease: true
          generate_release_notes: true
          files: builds/*