name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create release from this run'
        type: boolean
        default: false

env:
  NODE_VERSION: '22'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint & Type Check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript check
        run: bunx tsc --noEmit

  # Build macOS ARM64
  build-macos-arm64:
    name: Build macOS (ARM64)
    runs-on: macos-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Vite build
        run: bunx vite build

      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllocalchat-macos-arm64
          path: build/
          retention-days: 14

  # Build macOS x64
  build-macos-x64:
    name: Build macOS (x64)
    runs-on: macos-13
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Vite build
        run: bunx vite build

      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllocalchat-macos-x64
          path: build/
          retention-days: 14

  # Build Windows x64
  build-windows-x64:
    name: Build Windows (x64)
    runs-on: windows-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Vite build
        run: bunx vite build

      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllocalchat-windows-x64
          path: build/
          retention-days: 14

  # Build Linux x64
  build-linux-x64:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Vite build
        run: bunx vite build

      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllocalchat-linux-x64
          path: build/
          retention-days: 14

  # Build Linux ARM64
  build-linux-arm64:
    name: Build Linux (ARM64)
    runs-on: ubuntu-24.04-arm
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Vite build
        run: bunx vite build

      - name: Build Electrobun app
        run: bunx electrobun build --env=canary
        env:
          NODE_ENV: production

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: easyllocalchat-linux-arm64
          path: build/
          retention-days: 14

  # Create Release
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs:
      [build-macos-arm64, build-macos-x64, build-windows-x64, build-linux-x64, build-linux-arm64]
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Archive builds
        run: |
          mkdir -p builds
          for dir in easyllocalchat-*; do
            if [ -d "$dir" ]; then
              zip -r "builds/${dir}.zip" "$dir"
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: builds/*.zip

      - name: Create Canary Release
        uses: softprops/action-gh-release@v2
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true'
        with:
          tag_name: canary-${{ github.sha }}
          name: Canary Build ${{ github.sha }}
          draft: false
          prerelease: true
          generate_release_notes: true
          files: builds/*.zip